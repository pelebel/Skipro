<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SkiPro">

    
   <title>SkiPro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <div id="loadingSpinner" class="spinner"></div>
      <form class="search-box" onsubmit="event.preventDefault(); getWeather()">
            <div style="display: flex; gap: 8px; flex: 1;">
                <input type="text" id="cityInput" placeholder="Search mountains..." aria-label="Search for a mountain or city">
                <button type="submit">Go</button>
            </div>
            <div class="unit-toggle" style="display: flex; align-items: center; background: var(--glass); padding: 10px; border-radius: 16px; border: 1px solid var(--glass-border); min-width: 80px; justify-content: center;">
                <span id="unitLabel" style="font-size: 0.8rem; margin-right: 5px;">°C</span>
                <input type="checkbox" id="unitToggle" onchange="toggleUnits()" style="width: 16px; height: 16px; cursor: pointer;">
            </div>
        </form>

        <div id="errorMsg" class="error" data-i18n="error_not_found">Location not found.</div>

        <div id="weatherDisplay" style="display: none;">
            <div class="live-header">
                <p><span class="live-badge" data-i18n="live">Live</span> <span data-i18n="realtime">Real-time</span></p>
                <h1 id="liveTemp">--°C</h1>
                <p id="locationName">---</p>
            </div >

            <div class="forecast-list" id="forecastList"></div>
        </div >

        <div id="placeholderText">
            <p data-i18n="welcome">Tap "Go" or enter a city to begin.</p>
            <button onclick="autoLocate()" style="background: rgba(255,255,255,0.1); color: white; border: 1px solid var(--glass-border); margin-top: 10px;" data-i18n="use_location">
                📍 Use My Location
            </button>
        </div >
    </div>

    <script src="script.js"></script>
</body>
</html>
